<!DOCTYPE html>
<html>
<head>
    <title>Calculadora Pitágoras</title>
</head>
<body onload="sin_titulo();">

<script>
function sin_titulo() {
    var a, c, cat1, cat2, h, h1, lista_de_variables, op;

    document.write("Bienvenido al calculador de Pitágoras 2000<br>");
    document.write("Para comenzar queremos conocer tu nombre<br>");
    a = prompt();

    document.write("Bien! Bienvenido " + a + " que buen nombre :))<br>");
    prompt("Presiona Enter para continuar");

    document.write("Ahora esta máquina quiere saber qué quieres calcular.<br>");
    prompt("Presiona Enter para continuar");

    document.write("1: Calcular hipotenusa<br>");
    document.write("2: Calcular cateto<br>");
    op = Number(prompt("Elige una opción (1 o 2)"));

    if (op == 1) {
        document.write("Elegiste calcular hipotenusa<br>");
        
        cat1 = Number(prompt("Ingresa cateto 1"));
        cat2 = Number(prompt("Ingresa cateto 2"));

        h = Math.sqrt(Math.pow(cat1, 2) + Math.pow(cat2, 2));

        document.write("Tu hipotenusa es: " + h + "<br>");

    } else if (op == 2) {
        document.write("Elegiste calcular un cateto<br>");
        
        h1 = Number(prompt("Ingresa la hipotenusa"));
        cat1 = Number(prompt("Ingresa el otro cateto"));

        c = Math.sqrt(Math.pow(h1, 2) - Math.pow(cat1, 2));

        document.write("Tu cateto faltante es: " + c + "<br>");

    } else {
        document.write("Opción inválida<br>");
    }

    document.write("<br>Programa finalizado.");
}
</script>

</body>
</html>
